# fly.toml app configuration file generated for flashy-api on 2026-07-02T12:20:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'flashy-api'
primary_region = 'lhr'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[env]
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
